<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LNR — Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF2E4;
    --cream-soft:#F6E9D6;
    --wine:#7A1B2E;
    --wine-deep:#54101F;
    --gold:#B08D57;
    --gold-soft:#D9C5A0;
    --ink:#2B1B12;
    --blush:#F1DCC9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:'Cormorant Garamond', serif;
    -webkit-font-smoothing:antialiased;
  }
  .eyebrow{
    font-family:'Cinzel', serif;
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--wine);
  }

  /* ===== HEADER ===== */
  header{
    padding:26px 24px 22px;
    text-align:center;
    border-bottom:1px solid var(--gold-soft);
    position:relative;
  }
  .logo{
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:34px;
    letter-spacing:.14em;
    color:var(--wine);
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .logo svg{ width:16px; height:26px; }
  .tagline{
    margin-top:6px;
    font-style:italic;
    color:#7A6656;
    font-size:15px;
    letter-spacing:.02em;
  }

  /* ===== NAV / FILTERS ===== */
  nav{
    display:flex;
    justify-content:center;
    gap:34px;
    flex-wrap:wrap;
    padding:18px 16px;
    font-family:'Cinzel', serif;
    font-size:12.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
  }
  nav button{
    background:none;
    border:none;
    color:var(--ink);
    cursor:pointer;
    padding:6px 2px;
    position:relative;
    font-family:inherit;
    font-size:inherit;
    letter-spacing:inherit;
    text-transform:inherit;
  }
  nav button::after{
    content:"";
    position:absolute;
    left:50%; right:50%; bottom:-2px;
    height:1px;
    background:var(--wine);
    transition:left .25s ease, right .25s ease;
  }
  nav button.active, nav button:hover{ color:var(--wine); }
  nav button.active::after, nav button:hover::after{ left:0; right:0; }

  /* ===== GRID ===== */
  main{ max-width:1180px; margin:0 auto; padding:10px 20px 80px; }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:26px;
    margin-bottom:52px;
  }
  .section-title{
    display:flex;
    align-items:center;
    gap:14px;
    margin:44px 0 22px;
  }
  .section-title h2{
    font-family:'Cinzel', serif;
    font-size:18px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--wine-deep);
    white-space:nowrap;
  }
  .section-title .line{ height:1px; flex:1; background:var(--gold-soft); }

  .card{
    background:#fff;
    border:1px solid var(--gold-soft);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .card:hover{ transform:translateY(-4px); box-shadow:0 14px 28px -18px rgba(84,16,31,.35); }
  .thumb{
    aspect-ratio:1/1;
    background:linear-gradient(135deg, var(--blush), var(--cream-soft));
    display:flex; align-items:center; justify-content:center;
    position:relative;
    overflow:hidden;
    touch-action:pan-y;
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; cursor:zoom-in; }
  .thumb .placeholder-star{ width:38px; height:38px; opacity:.55; }

  .thumb-nav{
    position:absolute;
    top:50%; transform:translateY(-50%);
    width:28px; height:28px;
    border:none; border-radius:50%;
    background:rgba(255,255,255,.85);
    color:var(--wine-deep);
    font-size:13px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity:0;
    transition:opacity .2s ease, background .2s ease;
    z-index:2;
  }
  .thumb-nav:hover{ background:#fff; }
  .thumb-nav.prev{ left:8px; }
  .thumb-nav.next{ right:8px; }
  .thumb:hover .thumb-nav{ opacity:1; }

  .thumb-dots{
    position:absolute;
    bottom:8px; left:0; right:0;
    display:flex; justify-content:center; gap:5px;
    z-index:2;
  }
  .thumb-dots .dot{
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,.6);
    border:1px solid rgba(122,27,46,.4);
    cursor:pointer;
    transition:background .2s ease;
  }
  .thumb-dots .dot.active{ background:var(--wine); border-color:var(--wine); }
  .card-body{ padding:16px 18px 18px; display:flex; flex-direction:column; flex:1; }
  .card-cat{ font-size:10.5px; letter-spacing:.16em; color:var(--gold); font-family:'Cinzel',serif; margin-bottom:4px; }
  .card-name{ font-size:20px; font-weight:600; color:var(--ink); line-height:1.25; }
  .card-desc{ font-size:14.5px; color:#7A6656; margin-top:4px; flex:1; font-style:italic; }
  .card-price{ font-size:19px; color:var(--wine-deep); margin:12px 0 14px; font-weight:600; }
  .card-price .old{ font-size:14px; text-decoration:line-through; color:#B4A088; font-weight:400; margin-left:8px; }

  .btn-row{ display:flex; gap:8px; }
  .btn{
    flex:1;
    text-align:center;
    padding:10px 8px;
    font-family:'Cinzel', serif;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    text-decoration:none;
    border:1px solid transparent;
    cursor:pointer;
    transition:opacity .2s ease;
  }
  .btn:hover{ opacity:.85; }
  .btn-buy{ background:var(--wine); color:#fff; }
  .btn-ask{ background:transparent; border-color:var(--wine); color:var(--wine); display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-ask svg{ width:14px; height:14px; flex-shrink:0; fill:var(--wine); }

  /* star divider used inline */
  .star{ display:inline-block; }

  /* ===== FLOATING WHATSAPP ===== */
  .float-wa{
    position:fixed;
    bottom:22px; right:22px;
    width:56px; height:56px;
    background:#25D366;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
    z-index:50;
    text-decoration:none;
  }
  .float-wa svg{ width:28px; height:28px; fill:#fff; }

  footer{
    text-align:center;
    padding:30px 20px 40px;
    border-top:1px solid var(--gold-soft);
    font-size:13px;
    color:#8A7862;
  }

  @media (max-width:480px){
    .logo{ font-size:26px; }
    nav{ gap:18px; font-size:11px; }
  }

  /* ===== LIGHTBOX (visualização ampliada) ===== */
  .lightbox{
    position:fixed; inset:0;
    background:rgba(24,10,8,.92);
    display:none;
    align-items:center; justify-content:center;
    z-index:200;
    padding:60px 20px;
  }
  .lightbox.open{ display:flex; }
  .lightbox-content{
    position:relative;
    max-width:min(92vw, 640px);
    width:100%;
    touch-action:pan-y;
  }
  .lightbox-content img{
    width:100%; height:auto;
    max-height:78vh;
    object-fit:contain;
    display:block;
    background:#fff;
    border:1px solid var(--gold-soft);
  }
  .lightbox-close{
    position:fixed;
    top:18px; right:18px;
    width:40px; height:40px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    border:none;
    font-size:22px;
    line-height:1;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:201;
  }
  .lightbox-close:hover{ background:rgba(255,255,255,.22); }
  .lightbox-nav{
    position:fixed;
    top:50%; transform:translateY(-50%);
    width:44px; height:44px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    border:none;
    font-size:18px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:201;
  }
  .lightbox-nav:hover{ background:rgba(255,255,255,.22); }
  .lightbox-nav.prev{ left:16px; }
  .lightbox-nav.next{ right:16px; }
  .lightbox-caption{
    text-align:center;
    color:var(--blush);
    font-family:'Cinzel', serif;
    letter-spacing:.1em;
    text-transform:uppercase;
    font-size:13px;
    margin-top:16px;
  }
  .lightbox-dots{
    display:flex; justify-content:center; gap:7px;
    margin-top:14px;
  }
  .lightbox-dots .dot{
    width:7px; height:7px; border-radius:50%;
    background:rgba(255,255,255,.35);
    cursor:pointer;
    transition:background .2s ease;
  }
  .lightbox-dots .dot.active{ background:#fff; }

  @media (max-width:600px){
    .lightbox-nav.prev{ left:6px; }
    .lightbox-nav.next{ right:6px; }
    .lightbox-nav{ width:38px; height:38px; }
  }
</style>
</head>
<body>

<!-- ======================================================================
  CONFIGURAÇÃO RÁPIDA — edite aqui:
  1) WHATSAPP_NUMBER: número no formato DDI+DDD+NÚMERO, só dígitos.
  2) Cada produto tem "link": coloque o link de pagamento (Mercado Pago,
     PagSeguro, Stripe, Nuvemshop, InfinitePay, PIX copia-e-cola em link, etc.)
  3) Cada produto tem "img": troque pela URL da foto real do produto.
     Enquanto não tiver a foto, o card mostra um placeholder com a estrela LNR.
     Para mais de uma foto, separe as URLs com o caractere "|" (pipe), ex:
     https://.../foto1.jpg|https://.../foto2.jpg|https://.../foto3.jpg
     O card mostra setinhas e bolinhas para navegar entre as fotos.
========================================================================= -->
<script>
  const WHATSAPP_NUMBER = "5519998068891"; // <-- troque pelo número real da Lunore
  const CSV_FILE = "produtos.csv"; // <-- nome do arquivo CSV com os produtos

  let PRODUCTS = [];
</script>


<header>
  <div class="logo">
    L
    <svg viewBox="0 0 20 40" xmlns="http://www.w3.org/2000/svg"><path d="M10 0 L12 17 L20 20 L12 23 L10 40 L8 23 L0 20 L8 17 Z" fill="#7A1B2E"/></svg>
    R
  </div>
  <div class="tagline">semijoias · catálogo digital</div>
</header>

<nav id="filters"></nav>

<main>
  <div id="catalog"></div>
</main>

<a class="float-wa" id="floatWa" href="#" target="_blank" rel="noopener">
  <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.198.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12.001 2C6.478 2 2 6.477 2 12c0 1.86.505 3.6 1.377 5.093L2 22l4.99-1.348A9.955 9.955 0 0012.001 22C17.523 22 22 17.523 22 12S17.523 2 12.001 2zm0 18.09a8.06 8.06 0 01-4.278-1.233l-.307-.183-3.13.846.837-3.055-.2-.316A8.09 8.09 0 013.91 12c0-4.463 3.63-8.09 8.09-8.09 4.462 0 8.09 3.627 8.09 8.09 0 4.463-3.628 8.09-8.09 8.09z"/></svg>
</a>

<!-- Lightbox: visualização ampliada da foto do produto -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this) closeLightbox()">
  <button type="button" class="lightbox-close" onclick="closeLightbox()" aria-label="Fechar">&times;</button>
  <button type="button" class="lightbox-nav prev" id="lightboxPrev" onclick="lightboxChange(-1)" aria-label="Foto anterior">&#10094;</button>
  <button type="button" class="lightbox-nav next" id="lightboxNext" onclick="lightboxChange(1)" aria-label="Próxima foto">&#10095;</button>
  <div class="lightbox-content">
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-caption" id="lightboxCaption"></div>
    <div class="lightbox-dots" id="lightboxDots"></div>
  </div>
</div>

<footer>
  LNR — Lunore Semijoias · Atendimento e pagamento via WhatsApp e link de pagamento seguro
</footer>

<script>
  let grouped = {};
  let categories = [];

  // ---------- Parser de CSV (suporta campos entre aspas com vírgulas) ----------
  function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    // normaliza quebras de linha
    text = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
    for(let i=0;i<text.length;i++){
      const c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if(c === '"'){ inQuotes = true; }
        else if(c === ','){ row.push(field); field = ''; }
        else if(c === '\n'){
          row.push(field); field = '';
          rows.push(row); row = [];
        } else field += c;
      }
    }
    if(field !== '' || row.length){ row.push(field); rows.push(row); }

    // remove linhas totalmente vazias
    const cleanRows = rows.filter(r => r.some(v => v.trim() !== ''));
    if(!cleanRows.length) return [];

    const headers = cleanRows.shift().map(h => h.trim());
    return cleanRows.map(r => {
      const obj = {};
      headers.forEach((h, idx) => { obj[h] = (r[idx] !== undefined ? r[idx] : '').trim(); });
      return obj;
    });
  }

  // ---------- Carregamento do CSV ----------
  async function loadProducts(){
    const catalog = document.getElementById('catalog');
    try{
      const res = await fetch(CSV_FILE, { cache: "no-store" });
      if(!res.ok) throw new Error('Arquivo não encontrado: ' + res.status);
      const text = await res.text();
      PRODUCTS = parseCSV(text);
    }catch(err){
      console.error('Erro ao carregar produtos.csv:', err);
      catalog.innerHTML = `<p style="text-align:center; color:#7A6656; padding:40px 0;">
        Não foi possível carregar <b>${CSV_FILE}</b>. Verifique se o arquivo está na mesma pasta do catálogo
        e se você está acessando via servidor (GitHub Pages) e não abrindo o HTML direto do computador.
      </p>`;
      return;
    }

    grouped = {};
    PRODUCTS.forEach(p => { (grouped[p.cat] = grouped[p.cat] || []).push(p); });
    categories = Object.keys(grouped);

    buildNav();
    render('Todos');
  }

  function buildNav(){
    const nav = document.getElementById('filters');
    nav.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.textContent = 'Todos'; allBtn.classList.add('active');
    allBtn.onclick = () => render('Todos');
    nav.appendChild(allBtn);
    categories.forEach(cat=>{
      const b = document.createElement('button');
      b.textContent = cat;
      b.onclick = () => render(cat);
      nav.appendChild(b);
    });
  }

  function starSvg(){
    return `<svg class="placeholder-star" viewBox="0 0 20 40" xmlns="http://www.w3.org/2000/svg"><path d="M10 0 L12 17 L20 20 L12 23 L10 40 L8 23 L0 20 L8 17 Z" fill="#B08D57"/></svg>`;
  }

  // ---------- Galeria de imagens por produto ----------
  const imageState = {}; // { [id]: { imgs:[...], idx:0 } }

  function getImgs(p){
    return (p.img || '').split('|').map(s => s.trim()).filter(Boolean);
  }

  function updateImg(id){
    const state = imageState[id];
    if(!state) return;
    const imgEl = document.getElementById('img-' + id);
    if(imgEl) imgEl.src = state.imgs[state.idx];
    const dotsEl = document.getElementById('dots-' + id);
    if(dotsEl){
      Array.from(dotsEl.children).forEach((d, i) => d.classList.toggle('active', i === state.idx));
    }
  }

  function setImg(id, idx){
    const state = imageState[id];
    if(!state) return;
    state.idx = idx;
    updateImg(id);
  }

  function changeImg(id, dir){
    const state = imageState[id];
    if(!state) return;
    state.idx = (state.idx + dir + state.imgs.length) % state.imgs.length;
    updateImg(id);
  }
  // expõe globalmente para os onclick inline no HTML gerado
  window.setImg = setImg;
  window.changeImg = changeImg;

  // ---------- Swipe (arrastar o dedo) para navegar entre fotos ----------
  function addSwipeListener(el, onSwipeLeft, onSwipeRight){
    let startX = 0, startY = 0, swiped = false;

    el.addEventListener('touchstart', (e) => {
      if(e.touches.length !== 1) return;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      swiped = false;
    }, { passive: true });

    el.addEventListener('touchend', (e) => {
      const endX = e.changedTouches[0].clientX;
      const endY = e.changedTouches[0].clientY;
      const dx = endX - startX;
      const dy = endY - startY;
      // só considera swipe se o movimento horizontal for maior que o vertical
      if(Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5){
        swiped = true;
        if(dx < 0) onSwipeLeft(); else onSwipeRight();
      }
    }, { passive: true });

    // impede que o swipe seja também interpretado como clique (evita abrir o lightbox sem querer)
    el.addEventListener('click', (e) => {
      if(swiped){
        e.preventDefault();
        e.stopPropagation();
        swiped = false;
      }
    }, true);
  }

  // ---------- Lightbox (visualização ampliada) ----------
  let currentLightboxId = null;

  function openLightbox(id){
    const state = imageState[id];
    if(!state || !state.imgs.length) return;
    currentLightboxId = id;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderLightbox();
  }

  function closeLightbox(){
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    currentLightboxId = null;
  }

  function lightboxChange(dir){
    if(!currentLightboxId) return;
    changeImg(currentLightboxId, dir);
    renderLightbox();
  }

  function lightboxSetImg(idx){
    if(!currentLightboxId) return;
    setImg(currentLightboxId, idx);
    renderLightbox();
  }

  function renderLightbox(){
    const state = imageState[currentLightboxId];
    if(!state) return;
    const p = PRODUCTS.find(pr => pr.id === currentLightboxId);

    document.getElementById('lightboxImg').src = state.imgs[state.idx];
    document.getElementById('lightboxImg').alt = p ? p.nome : '';
    document.getElementById('lightboxCaption').textContent = p ? p.nome : '';

    const hasMultiple = state.imgs.length > 1;
    document.getElementById('lightboxPrev').style.display = hasMultiple ? 'flex' : 'none';
    document.getElementById('lightboxNext').style.display = hasMultiple ? 'flex' : 'none';

    const dotsEl = document.getElementById('lightboxDots');
    dotsEl.innerHTML = hasMultiple
      ? state.imgs.map((_, i) => `<span class="dot${i === state.idx ? ' active' : ''}" onclick="lightboxSetImg(${i})"></span>`).join('')
      : '';
  }

  document.addEventListener('keydown', (e) => {
    if(!document.getElementById('lightbox').classList.contains('open')) return;
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowLeft') lightboxChange(-1);
    if(e.key === 'ArrowRight') lightboxChange(1);
  });

  window.openLightbox = openLightbox;
  window.closeLightbox = closeLightbox;
  window.lightboxChange = lightboxChange;
  window.lightboxSetImg = lightboxSetImg;

  function waLink(p){
    const msg = encodeURIComponent(`Olá! Tenho interesse na peça "${p.nome}" (${p.preco}) do catálogo LNR. Poderia me ajudar? 😊`);
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
  }

  function render(filter){
    document.querySelectorAll('#filters button').forEach(b=>{
      b.classList.toggle('active', b.textContent === filter);
    });
    const catalog = document.getElementById('catalog');
    catalog.innerHTML = '';
    const cats = filter === 'Todos' ? categories : [filter];

    cats.forEach(cat=>{
      const title = document.createElement('div');
      title.className = 'section-title';
      title.innerHTML = `<h2>${cat}</h2><div class="line"></div>`;
      catalog.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'grid';

      grouped[cat].forEach(p=>{
        const card = document.createElement('div');
        card.className = 'card';
        const priceLink = p.link && p.link.trim() ? p.link : waLink(p);

        const imgs = getImgs(p);
        imageState[p.id] = { imgs, idx: 0 };
        const hasMultiple = imgs.length > 1;

        let thumbHtml;
        if(imgs.length === 0){
          thumbHtml = starSvg();
        } else {
          thumbHtml = `<img id="img-${p.id}" src="${imgs[0]}" alt="${p.nome}" onclick="openLightbox('${p.id}')">`;
          if(hasMultiple){
            thumbHtml += `
              <button type="button" class="thumb-nav prev" onclick="changeImg('${p.id}', -1)" aria-label="Foto anterior">&#10094;</button>
              <button type="button" class="thumb-nav next" onclick="changeImg('${p.id}', 1)" aria-label="Próxima foto">&#10095;</button>
              <div class="thumb-dots" id="dots-${p.id}">
                ${imgs.map((_, i) => `<span class="dot${i === 0 ? ' active' : ''}" onclick="setImg('${p.id}', ${i})"></span>`).join('')}
              </div>`;
          }
        }

        card.innerHTML = `
          <div class="thumb">${thumbHtml}</div>
          <div class="card-body">
            <div class="card-cat">${p.cat}</div>
            <div class="card-name">${p.nome}</div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-price">${p.preco}${p.precoAntigo ? `<span class="old">${p.precoAntigo}</span>` : ''}</div>
            <div class="btn-row">
              <a class="btn btn-ask" href="${waLink(p)}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.198.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
                  <path d="M12.001 2C6.478 2 2 6.477 2 12c0 1.86.505 3.6 1.377 5.093L2 22l4.99-1.348A9.955 9.955 0 0012.001 22C17.523 22 22 17.523 22 12S17.523 2 12.001 2zm0 18.09a8.06 8.06 0 01-4.278-1.233l-.307-.183-3.13.846.837-3.055-.2-.316A8.09 8.09 0 013.91 12c0-4.463 3.63-8.09 8.09-8.09 4.462 0 8.09 3.627 8.09 8.09 0 4.463-3.628 8.09-8.09 8.09z"/>
                </svg>
                Perguntar
              </a>
              <a class="btn btn-buy" href="${priceLink}" target="_blank" rel="noopener">Comprar</a>
            </div>
          </div>`;
        grid.appendChild(card);

        if(hasMultiple){
          const thumbEl = card.querySelector('.thumb');
          addSwipeListener(thumbEl, () => changeImg(p.id, 1), () => changeImg(p.id, -1));
        }
      });
      catalog.appendChild(grid);
    });
  }

  document.getElementById('floatWa').href =
    `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('Olá! Vi o catálogo LNR e gostaria de mais informações 😊')}`;

  // swipe no lightbox (o elemento é fixo no HTML, então só precisa configurar uma vez)
  addSwipeListener(
    document.getElementById('lightboxContent') || document.querySelector('.lightbox-content'),
    () => lightboxChange(1),
    () => lightboxChange(-1)
  );

  loadProducts();
</script>

</body>
</html>
